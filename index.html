<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<meta name="theme-color" content="#07080b">

<meta name="apple-mobile-web-app-capable" content="yes">

<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<meta name="apple-mobile-web-app-title" content="KLYRAVA">

<link rel="manifest" href="manifest.json">

<link rel="apple-touch-icon" href="icons/icon-180.png">

<title>KLYRAVA</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<!-- ========================= -->
<!-- EMERGENCY SCREEN -->
<!-- ========================= -->

<section
id="call"
class="screen active">

<div class="statusbar">

<div class="carrier">
ALTAIR MOBILE
</div>

<div class="clock">
09:41
</div>

</div>

<div class="content">

<div class="subtitle">
EMERGENCY ACCESS
</div>

<button
id="sos">

SOS

</button>

<button
id="playerBtn"
class="playerButton"
aria-label="Open Player">

<div class="vinyl"></div>

</button>

</div>

</section>


<!-- ========================= -->
<!-- PLAYER -->
<!-- ========================= -->

<section
id="player"
class="screen">

<div class="playerContent">

<div class="album"></div>

<div class="track">

Now Playing

</div>

<div class="bar">

<div id="fill"></div>

</div>

<button
id="back"
class="backButton">

BACK

</button>

</div>

</section>


<script src="app.js"></script>

</body>

</html>
